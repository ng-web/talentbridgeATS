services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - talentbridge

  app:
    build:
      context: ./src
      dockerfile: Dockerfile
    user: "1000:1000"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db
    networks:
      - talentbridge

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: talentbridge_portal
      MYSQL_USER: talentbridge
      MYSQL_PASSWORD: talentbridge_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3307:3306"
    volumes:
      - talentbridge_db:/var/lib/mysql
    networks:
      - talentbridge

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - talentbridge

  node:
    image: node:20-alpine
    user: "1000:1000"
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    networks:
      - talentbridge

networks:
  talentbridge:

volumes:
  talentbridge_db:
